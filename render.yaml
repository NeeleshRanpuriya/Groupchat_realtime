services:
  - type: web
    name: groupchat-realtime-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENABLE_TOXICITY_MODEL
        value: false
      - key: DATABASE_URL
        value: sqlite:///./chat_moderation.db
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://groupchat-realtime.vercel.app
